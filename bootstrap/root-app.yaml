apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-argocd-root
  namespace: argocd
spec:

  project: default

  source:
    repoURL: https://github.com/Akash-HC/enterprise-gitops-demo.git
    targetRevision: main
    path: applicationsets

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
