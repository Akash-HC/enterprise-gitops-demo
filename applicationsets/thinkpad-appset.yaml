apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: thinkpad-appset
  namespace: argocd
spec:

  generators:
    - git:
        repoURL: https://github.com/Akash-HC/enterprise-gitops-demo.git
        revision: master

        directories:
          - path: customers/thinkpad/*

  template:

    metadata:
      name: 'thinkpad-{{path.basename}}'

    spec:

      project: thinkpad-project

      source:
        repoURL: https://github.com/Akash-HC/enterprise-gitops-demo.git
        targetRevision: master
        path: '{{path}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: thinkpad-enterprise

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
